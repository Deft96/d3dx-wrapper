[FrameLimit]

; ==============================
;  Deft96's Smooth D3Dx Wrapper
; ==============================

; ---- FRAME PACING MODE ----
; 0 = Low Latency (Competitive, minimal delay, may jitter)
; 1 = Smooth / Console-like (Fixed cadence, jitter-resistant, slightly more latency but much more consistent)

Mode=1

; ---- FORCED VSYNC ----
; 0 = Disable Forced VSync (Disabled. Defaults to in-game or GPU control panel VSync, if set)
; 1 = Forced VSync ON (Enabled. Usually smoother than in-game or GPU control panel VSync)
; NOTE: Do NOT use with GSync/FreeSync - leave this at 0 for variable refresh rate setups.
; If set to 1, remember to disable in-game or GPU control panel VSync.

ForceVSync=0

; ---- DELAY (SECONDS) ----
; Delays hook installation by N seconds. Use when anti-cheat or
; mod loaders (REFramework) need time to initialize before hooks.
; Example: DelaySeconds=12 for RE Requiem + REFramework.

DelaySeconds=0

; ---- TARGET FRAMERATE ----
; Set your desired FPS directly. Supports fractional values (e.g. 29.97, 58.674).
; Set to 0 to disable frame limiting.
; IGNORED if a "Divisor" is set (See below).

TargetFPS=60.00

; ---- REFRESH-BASED DIVISOR ----
; Set Divisor to auto-calculate FPS = RefreshRate / Divisor to have even smoother framepacing.
; If set to 0, will use the previous setting "TargetFPS" instead.
; If using a divisor, make sure to set your monitor refresh rate in the next setting.
; Examples:
;   60Hz/2= 30fps    120Hz/2= 60fps    120Hz/3= 40fps
;    120Hz/4= 30fps    144Hz/3= 48fps    180Hz/3= 60fps

Divisor=0

; ---- DISPLAY REFRESH RATE ----
; REQUIRED when using the Divisor above. Set this to your display's actual refresh rate as configured in Windows.
; GSync/FreeSync/VRR tip: Use TargetFPS (Not Divisor) and set it 3 FPS below your max refresh rate. This keeps
; the display in VRR mode without hitting the VSync ceiling, giving you the lowest possible latency with no tearing.
;   Example: 144Hz display -> TargetFPS=141.00

RefreshRate=60

; ---- DEBUG LOG ----
; 0 = No log file (default, keep this for normal use)
; 1 = Write d3d9_wrapper.log / d3d10_wrapper.log / dxgi_wrapper.log / d3d12_wrapper.log to %TEMP% (for troubleshooting)

DebugLog=0
